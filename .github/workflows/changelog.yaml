name: Generate Changelog

on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  generate-changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate Changelog
        uses: agritheory/test_utils/actions/generate_changelog@e2ec96465ffbf9c646021db6091a7478a64ee9ba
        with:
            github-token: ${{ secrets.GITHUB_TOKEN }}
            anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
